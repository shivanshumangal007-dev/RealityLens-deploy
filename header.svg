<svg width="1200" height="320" viewBox="0 0 1200 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>RealityLens — AI-Powered Misinformation Detection</title>
  <desc>Header graphic showing a magnifying glass over the RealityLens title</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="40%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="20%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="320" cy="152" r="104"/>
    </clipPath>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <circle cx="320" cy="152" r="170" fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="320" cy="152" r="140" fill="none" stroke="#34d399" stroke-width="1" stroke-opacity="0.1"/>

  <text x="320" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800"
        fill="#e6fff8" text-anchor="middle" letter-spacing="-2" opacity="0.12">RealityLens</text>

  <circle cx="320" cy="152" r="104" fill="url(#glassGrad)"/>

  <text x="320" y="174" font-family="'Segoe UI', Arial, sans-serif" font-size="88" font-weight="900"
        fill="#ffffff" text-anchor="middle" letter-spacing="-3"
        clip-path="url(#lensClip)">RealityLens</text>

  <circle cx="320" cy="152" r="104" fill="url(#shineGrad)"/>
  <circle cx="320" cy="152" r="104" fill="none" stroke="url(#rimGrad)" stroke-width="6"/>
  <circle cx="320" cy="152" r="97" fill="none" stroke="#a7f3d0" stroke-width="1" stroke-opacity="0.25"/>

  <ellipse cx="285" cy="116" rx="26" ry="14" fill="#ffffff" opacity="0.1" transform="rotate(-30 285 116)"/>

  <line x1="401" y1="240" x2="490" y2="302" stroke="url(#handleGrad)" stroke-width="20" stroke-linecap="round"/>
  <line x1="401" y1="240" x2="490" y2="302" stroke="#a7f3d0" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <text x="660" y="138" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="700"
        fill="#ffffff" text-anchor="start" letter-spacing="-1">Reality</text>
  <text x="660" y="204" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="200"
        fill="#6ee7b7" text-anchor="start" letter-spacing="-1">Lens</text>

  <text x="660" y="238" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400"
        fill="#a7f3d0" text-anchor="start" letter-spacing="1.5">AI-POWERED MISINFORMATION DETECTION</text>

  <line x1="660" y1="252" x2="1100" y2="252" stroke="#34d399" stroke-width="1" stroke-opacity="0.35"/>

  <rect x="0" y="290" width="1200" height="30" fill="url(#footerGrad)" opacity="0.95"/>
  <text x="600" y="311" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600"
        fill="#064e3b" text-anchor="middle" letter-spacing="3">DETECT  ·  VERIFY  ·  TRUST</text>
</svg>
